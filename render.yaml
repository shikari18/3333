services:
  # ─── BACKEND — Django REST API ───────────────────────────────────────────────
  - type: web
    name: examglow-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT core.asgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DATABASE_URL
        fromDatabase:
          name: examglow-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: RENDER
        value: "true"
      - key: OPENROUTER_API_KEY
        value: ""
      - key: OPENROUTER_MODEL
        value: "openrouter/auto"
      - key: GOOGLE_STUDIO_API_KEY
        value: ""
      - key: USE_S3
        value: "False"
    healthCheckPath: /health/

  # ─── FRONTEND — Vite SPA (Static Site) ──────────────────────────────────────
  - type: web
    name: examglow-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20.11.0"
      - key: VITE_API_URL
        value: "https://examglow-backend.onrender.com"
      - key: VITE_GROQ_API_KEY
        value: ""

databases:
  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  - name: examglow-db
    plan: free
    databaseName: examglow
    user: examglow
