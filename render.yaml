services:
  # ─── BACKEND — Django REST API ───────────────────────────────────────────────
  - type: web
    name: examglow-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DATABASE_URL
        fromDatabase:
          name: examglow-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        # Will be updated after frontend is deployed with its URL
        value: "https://examglow.onrender.com"
      - key: RENDER
        value: "true"
      # ── AI Keys — set these manually in the Render dashboard ──
      - key: OPENROUTER_API_KEY
        value: ""
      - key: OPENROUTER_MODEL
        value: "openrouter/auto"
      - key: GOOGLE_STUDIO_API_KEY
        value: ""
      # ── Storage — set USE_S3=True and fill these to use Cloudflare R2 ──
      - key: USE_S3
        value: "False"
      # - key: AWS_ACCESS_KEY_ID
      #   value: ""
      # - key: AWS_SECRET_ACCESS_KEY
      #   value: ""
      # - key: AWS_STORAGE_BUCKET_NAME
      #   value: ""
      # - key: AWS_S3_ENDPOINT_URL
      #   value: ""
      # - key: AWS_S3_CUSTOM_DOMAIN
      #   value: ""
    healthCheckPath: /health/

  # ─── FRONTEND — Vite SPA (Static Site) ──────────────────────────────────────
  - type: web
    name: examglow-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    # Vite SPA — all routes must fall back to index.html for client-side routing
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20.11.0"
      # Replace with your deployed backend URL, e.g. https://examglow-backend.onrender.com
      - key: VITE_API_URL
        value: "https://examglow-backend.onrender.com"
      # Optional — enables client-side AI tutor and exam prep fallback
      - key: VITE_GROQ_API_KEY
        value: ""

  # ─── BACKGROUND WORKER — Django Q (AI synthesis tasks) ───────────────────────
  # Uncomment when you upgrade to a paid plan (free tier spins down after 15 mins)
  # - type: worker
  #   name: examglow-worker
  #   env: python
  #   plan: starter
  #   rootDir: backend
  #   buildCommand: "./build.sh"
  #   startCommand: "python manage.py qcluster"
  #   envVars:
  #     - key: DATABASE_URL
  #       fromDatabase:
  #         name: examglow-db
  #         property: connectionString
  #     - key: DJANGO_SECRET_KEY
  #       generateValue: true
  #     - key: DEBUG
  #       value: "False"
  #     - key: PYTHON_VERSION
  #       value: "3.12.3"

databases:
  # ─── PostgreSQL (free tier — 1 GB, 90-day expiry on free plan) ──────────────
  - name: examglow-db
    plan: free
    databaseName: examglow
    user: examglow
